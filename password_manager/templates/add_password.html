{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">💾 Сохранить пароль</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="site" class="form-label">Сайт *</label>
                        <input type="text" class="form-control" id="site" name="site" required 
                               value="{{ request.args.get('site', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="login" class="form-label">Логин *</label>
                        <input type="text" class="form-control" id="login" name="login" required
                               value="{{ request.args.get('login', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль *</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="password" name="password" required
                                   value="{{ request.args.get('password', '') }}">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">👁️</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Заметки</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Сохранить</button>
                    <a href="{{ url_for('list_passwords') }}" class="btn btn-secondary w-100 mt-2">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    if (input.type === 'password') {
        input.type = 'text';
    } else {
        input.type = 'password';
    }
}
</script>
{% endblock %}
