{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h3 class="mb-0">📄 {{ password.site }}</h3>
            </div>
            <div class="card-body">
                <dl class="row">
                    <dt class="col-sm-3">Сайт</dt>
                    <dd class="col-sm-9">{{ password.site }}</dd>
                    
                    <dt class="col-sm-3">Логин</dt>
                    <dd class="col-sm-9">{{ password.login }}</dd>
                    
                    <dt class="col-sm-3">Пароль</dt>
                    <dd class="col-sm-9">
                        <span id="passwordDisplay">••••••••</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="togglePassword()">👁️ Показать</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="copyPassword()">📋</button>
                    </dd>
                    
                    {% if password.notes %}
                    <dt class="col-sm-3">Заметки</dt>
                    <dd class="col-sm-9">{{ password.notes }}</dd>
                    {% endif %}
                    
                    <dt class="col-sm-3">Добавлен</dt>
                    <dd class="col-sm-9">{{ password.created_at }}</dd>
                </dl>
            </div>
            <div class="card-footer">
                <a href="{{ url_for('list_passwords') }}" class="btn btn-secondary">← Назад</a>
                <form method="POST" action="{{ url_for('delete_password', password_id=password.id) }}" class="d-inline float-end">
                    <button type="submit" class="btn btn-danger" onclick="return confirm('Удалить?')">🗑️ Удалить</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
let showing = false;
const realPassword = "{{ password.password }}";

function togglePassword() {
    const display = document.getElementById('passwordDisplay');
    showing = !showing;
    display.textContent = showing ? realPassword : '••••••••';
    document.querySelector('button').textContent = showing ? '🙈 Скрыть' : '👁️ Показать';
}

function copyPassword() {
    navigator.clipboard.writeText(realPassword).then(() => {
        alert('Пароль скопирован в буфер обмена!');
    });
}
</script>
{% endblock %}
