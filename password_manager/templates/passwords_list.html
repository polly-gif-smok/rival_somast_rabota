>
                    {% for p in passwords %}
                    <tr>
                        <td>{{ p.id }}</td>
                        <td><strong>{{ p.site }}</strong></td>
                        <td>{{ p.login }}</td>
                        <td>
                            <span class="password-mask">••••••••</span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="showPassword({{ p.id }}, '{{ p.password }}')">
                                👁️
                            </button>
                        </td>
                        <td>{{ p.created_at[:10] }}</td>
                        <td>
                            <a href="{{ url_for('view_password', password_id=p.id) }}" class="btn btn-sm btn-info">📄</a>
                            <form method="POST" action="{{ url_for('delete_password', password_id=p.id) }}" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">🗑️</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="alert alert-info">
            Паролей пока нет. <a href="{{ url_for('add_password') }}">Добавьте первый!</a>
        </div>
        {% endif %}
    </div>
</div>

<script>
function showPassword(id, password) {
    alert(`Пароль: ${password}`);
}
</script>
{% endblock %}
